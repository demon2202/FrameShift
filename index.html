<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrameShift</title>
    <meta name="description" content="A social-first creative platform where designers publish poster artwork, follow other creators, and discover visual inspiration." />
    <link rel="icon" href="/favicon.ico" />           
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#CCFF00" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW setup failed'));
        });
      }
    </script>
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div class="grain"></div>
    <script type="module" src="/src/index.tsx"></script>  <!-- Vite replaces this at build time -->
  </body>
</html>
