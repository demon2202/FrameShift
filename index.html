<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PosterVerse</title>
    <meta name="description" content="A social-first creative platform where designers publish poster artwork, follow other creators, and discover visual inspiration." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#CCFF00" />
    <script>
      // Register SW
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW setup failed'));
        });
      }
    </script>
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="error-log" style="color:red; background:white; position:fixed; z-index:999999; top:0; left:0;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.getElementById('error-log').innerText += "\n" + msg + " " + (error && error.stack ? error.stack : '');
        return false;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('error-log').innerText += "\nUnhandled Rejection: " + event.reason;
      };
    </script>
    <div id="root"></div>
    <div class="grain"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
